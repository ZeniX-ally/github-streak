name: Daily Streak

on:
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update streak counter
        run: |
          FILE="streak.md"
          if [ -f "$FILE" ]; then
            COUNT=$(grep -oP '(?<=Streak: )\d+' "$FILE" || echo "0")
            NEW_COUNT=$((COUNT + 1))
          else
            NEW_COUNT=1
          fi
          TODAY=$(date +%Y-%m-%d)
          echo "# GitHub Streak" > "$FILE"
          echo "" >> "$FILE"
          echo "Streak: $NEW_COUNT days" >> "$FILE"
          echo "Last updated: $TODAY" >> "$FILE"

      - name: Commit and push with varying intensity
        run: |
          git config user.name "github-streak[bot]"
          git config user.email "github-streak[bot]@users.noreply.github.com"
          TODAY=$(date +%Y-%m-%d)

          # Random number of extra commits: 0 to 7 (1 original + up to 7 = max 8 total)
          EXTRA=$((RANDOM % 8))

          git add -A
          git commit -m "streak: update $TODAY"

          for i in $(seq 1 $EXTRA); do
            echo "$TODAY - commit #$i" >> streak.md
            git add -A
            git commit -m "streak: $TODAY (#$i)"
          done

          git push
