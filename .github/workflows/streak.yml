name: Daily Streak

on:
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update streak counter
        run: |
          FILE="streak.md"
          if [ -f "$FILE" ]; then
            COUNT=$(grep -oP '(?<=Streak: )\d+' "$FILE" || echo "0")
            NEW_COUNT=$((COUNT + 1))
          else
            NEW_COUNT=1
          fi
          TODAY=$(date +%Y-%m-%d)
          echo "# GitHub Streak" > "$FILE"
          echo "" >> "$FILE"
          echo "Streak: $NEW_COUNT days" >> "$FILE"
          echo "Last updated: $TODAY" >> "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-streak[bot]"
          git config user.email "github-streak[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "streak: update $(date +%Y-%m-%d)"
          git push
